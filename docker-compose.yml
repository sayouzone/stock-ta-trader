services:
  # ── FastAPI Server ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sta-trader-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      uvicorn interfaces.api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info

  # ── Telegram Bot (별도 프로세스) ─────────────────────────
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sta-trader-telegram
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    command: python -m run_telegram

  # ── PostgreSQL ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sta-trader-db
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
      POSTGRES_DB: trader_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trader_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sta-trader-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  # ── Cloudflare Tunnel (프로덕션 외부 접근) ─────────────
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: sta-trader-tunnel
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  pgdata:
  redisdata:
